name: AGBROWSE Remote Smoke

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL to open with AGBROWSE
        required: true
        default: https://example.com
      max_nodes:
        description: Maximum interactive snapshot nodes
        required: true
        default: "80"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install package dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: |
          npx playwright install chromium --with-deps
          CHROME_PATH="$(find "$HOME/.cache/ms-playwright" \
            \( -path '*/chrome-linux/chrome' \
               -o -path '*/chrome-linux64/chrome' \
               -o -path '*/chrome-headless-shell-linux64/chrome-headless-shell' \) \
            -type f | head -n 1)"
          if [ -z "$CHROME_PATH" ]; then
            echo "Chromium executable not found under ~/.cache/ms-playwright" >&2
            exit 1
          fi
          echo "CHROME_BINARY_PATH=$CHROME_PATH" >> "$GITHUB_ENV"

      - name: Run AGBROWSE headless smoke
        env:
          AGBROWSE_JSON_ERRORS: "1"
          CHROME_HEADLESS: "1"
          CHROME_NO_SANDBOX: "1"
          CDP_PORT: "9223"
          SMOKE_URL: ${{ inputs.url }}
          MAX_NODES: ${{ inputs.max_nodes }}
        run: |
          {
            echo "## status before start"
            node bin/agbrowse.mjs status --json || true
            echo
            echo "## start"
            node bin/agbrowse.mjs start --headless --port "$CDP_PORT"
            echo
            echo "## status after start"
            node bin/agbrowse.mjs status --json
            echo
            echo "## navigate"
            node bin/agbrowse.mjs navigate "$SMOKE_URL" --wait-until domcontentloaded --timeout 60000
            echo
            echo "## active tab"
            node bin/agbrowse.mjs active-tab --json
            echo
            echo "## interactive snapshot"
            node bin/agbrowse.mjs snapshot --interactive --max-nodes "$MAX_NODES"
            echo
            echo "## screenshot"
            node bin/agbrowse.mjs screenshot --json
          } | tee agbrowse-smoke-output.txt

      - name: Stop AGBROWSE
        if: always()
        env:
          CDP_PORT: "9223"
        run: node bin/agbrowse.mjs stop || true

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agbrowse-remote-smoke
          if-no-files-found: ignore
          path: |
            agbrowse-smoke-output.txt
            ~/.browser-agent/screenshots/*.png
