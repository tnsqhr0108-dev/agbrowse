name: Pages Safe Check

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-safe-check
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check docs safely
        run: |
          echo "Pages workflow is manual safe mode."
          echo "No automatic deploy is performed."
          if [ -f docs/index.html ]; then
            echo "docs/index.html exists"
          else
            echo "docs/index.html missing; deploy skipped"
          fi
          find docs -maxdepth 2 -type f 2>/dev/null | sort | sed -n '1,120p' || true
